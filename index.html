<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6. รายงานเจ้าหนี้ ทวนเจ้าหนี้ บริษัท</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html { font-size: 90%; }
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f3f4f6; }
        .print-only { display: none; }
        
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body, html { background-color: white; height: auto !important; overflow: visible !important; display: block !important; }
            .h-screen, .overflow-hidden, .overflow-auto, .overflow-x-auto, .flex-1, main, #printArea, #contentContainer { 
                height: auto !important; overflow: visible !important; display: block !important; position: static !important; margin: 0 !important; padding: 0 !important; page-break-inside: auto !important; break-inside: auto !important; 
            }
            .shadow-sm { box-shadow: none !important; }
            .rounded-lg { border-radius: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-full-width { width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            table { width: 100%; border-collapse: collapse; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
            th, td { border: 1px solid #000 !important; padding: 0.6mm 2px !important; height: 0.5mm !important; line-height: 1 !important; font-size: 6.5pt !important; }
            th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; font-weight: bold !important; }
            td { font-weight: normal !important; }
            td.font-medium, td.font-semibold, td.font-bold { font-weight: normal !important; }
            tfoot td { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; font-weight: bold !important; }
            .print-fixed-table { table-layout: fixed !important; width: 100% !important; max-width: 100% !important; margin: 0 auto !important; }
            .print-fixed-table th, .print-fixed-table td { white-space: normal !important; word-wrap: break-word !important; overflow-wrap: break-word !important; }
            .print-truncate { white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; word-wrap: normal !important; overflow-wrap: normal !important; }
            tbody.page-break-before { page-break-before: always !important; break-before: page !important; }
            input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1px solid #000; display: inline-block; position: relative; }
            input[type="checkbox"]:checked::after { content: '✔'; position: absolute; top: -3px; left: 2px; font-size: 12px; }
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-blue-800 text-white p-4 shadow-md no-print shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="https://financenangrong.github.io/financial-system/" class="text-white hover:bg-blue-700 focus:outline-none p-2 rounded transition-colors flex items-center gap-1" title="ย้อนกลับ">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="hidden sm:inline font-medium text-sm">ย้อนกลับ</span>
            </a>
            <h1 class="text-2xl font-bold">6. รายงานเจ้าหนี้ ทวนเจ้าหนี้ บริษัท</h1>
        </div>
        <div id="statusBadge" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-medium flex items-center gap-2">กำลังโหลดข้อมูล...</div>
    </header>
    <main class="flex-1 bg-white overflow-auto p-6 print-full-width" id="printArea">
        <div id="contentContainer" class="max-w-7xl mx-auto">
            <div class="text-center text-gray-400 mt-20 no-print">กำลังโหลดข้อมูลอัตโนมัติ กรุณารอสักครู่...</div>
        </div>
    </main>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-vY0-Ic04efRHyFptGVLR3UCipBUBhJiFSCWl_3RDAbQP6cUdQaz53D_1Sru3rg/pub?output=csv";
        let appData = [];
        let selectedCompany = ""; 

        function updateStatus(success) {
            const badge = document.getElementById('statusBadge');
            if (badge) {
                badge.className = `text-sm px-3 py-1 rounded-full ${success ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'} font-medium flex items-center gap-2`;
                badge.innerHTML = `<span class="relative flex h-3 w-3"><span class="relative inline-flex rounded-full h-3 w-3 ${success ? 'bg-emerald-500' : 'bg-red-500'}"></span></span>${success ? 'ข้อมูลพร้อมใช้งาน' : 'โหลดล้มเหลว'}`;
            }
        }

        function parseNumberValue(v) {
            if (!v) return 0;
            if (typeof v === 'string') v = v.replace(/,/g, '');
            const n = parseFloat(v);
            return isNaN(n) ? 0 : n;
        }

        function formatNumber(n) {
            const v = parseFloat(n);
            return (isNaN(v) || v === 0) ? '0.00' : v.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getJSDate(v) {
            if (!v) return null;
            if (typeof v === 'number') return new Date(new Date(Date.UTC(1899, 11, 30)).getTime() + v * 86400000);
            const p = String(v).trim().split(/[-/]/);
            if (p.length === 3) {
                let d = parseInt(p[0]), m = parseInt(p[1]) - 1, y = parseInt(p[2]);
                if (p[0].length === 4) { y = parseInt(p[0]); m = parseInt(p[1]) - 1; d = parseInt(p[2]); }
                if (y < 100) y += y >= 50 ? 2500 : 2000;
                if (y > 2400) y -= 543;
                return new Date(y, m, d);
            }
            return isNaN(new Date(v).getTime()) ? null : new Date(v);
        }

        const parseDateForFilter = (s) => {
            if (!s || String(s).trim() === '-' || String(s).trim() === '') return null;
            let c = String(s).trim();
            const p = c.split(/[\/\-]/);
            if (p.length === 3) {
                let d = parseInt(p[0], 10), m = parseInt(p[1], 10) - 1, y = parseInt(p[2], 10);
                if (p[0].length === 4) { y = parseInt(p[0], 10); m = parseInt(p[1], 10) - 1; d = parseInt(p[2], 10); }
                if (y < 100) y += y > 40 ? 2500 : 2000;
                if (y >= 2400) y -= 543;
                let dObj = new Date(y, m, d);
                if (!isNaN(dObj.getTime())) return dObj.getTime();
            }
            const tS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const tF = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            const tM = c.match(/(\d{1,2})\s+([ก-๙\.]+)\s+(\d{2,4})/);
            if (tM) {
                let d = parseInt(tM[1], 10), mo = tM[2], y = parseInt(tM[3], 10), m = tS.findIndex(t => mo.includes(t));
                if (m === -1) m = tF.findIndex(t => mo.includes(t));
                if (m === -1) m = 0;
                if (y < 100) y += y > 40 ? 2500 : 2000;
                if (y >= 2400) y -= 543;
                return new Date(y, m, d).getTime();
            }
            if (!isNaN(c) && Number(c) > 10000) return new Date(Date.UTC(1899, 11, 30)).getTime() + Number(c) * 86400000;
            let dObj = new Date(c);
            return isNaN(dObj.getTime()) ? null : dObj.getTime();
        };

        function formatThaiDate(v, shortYear = false) {
            if (!v) return '-';
            let d, m, y;
            if (typeof v === 'number') {
                const doObj = new Date(new Date(Date.UTC(1899, 11, 30)).getTime() + v * 86400000);
                d = doObj.getUTCDate();
                m = doObj.getUTCMonth() + 1;
                y = doObj.getUTCFullYear();
                if (y < 2500) y += 543;
            } else {
                let ds = String(v).trim();
                const p = ds.split(/[-/]/);
                if (p.length === 3) {
                    d = parseInt(p[0]); m = parseInt(p[1]); y = parseInt(p[2]);
                    if (p[0].length === 4) { y = parseInt(p[0]); m = parseInt(p[1]); d = parseInt(p[2]); }
                    if (!isNaN(d) && !isNaN(m) && !isNaN(y)) {
                        if (y < 100) y += y >= 50 ? 2500 : 2000;
                        if (y < 2500) y += 543;
                    } else return ds;
                } else return ds;
            }
            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${shortYear ? String(y).slice(-2) : y}`;
        }

        function formatThaiDateShort(v) {
            if (!v) return '-';
            const jd = getJSDate(v);
            if (!jd) return String(v);
            const tS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            return `${jd.getDate()} ${tS[jd.getMonth()]} ${String(jd.getFullYear()).slice(-2)}`;
        }

        function enrichData(rows) {
            return rows.map(r => {
                r._e = parseNumberValue(r[4]);
                r._f = parseNumberValue(r[5]);
                r._g = parseNumberValue(r[6]);
                r._h = parseNumberValue(r[7]);
                r._compC = String(r[2] || '').trim();
                r._compCSearch = r._compC.toLowerCase().replace(/\s+/g, '');
                r._invD = r[3] || '-';
                r._valM = String(r[12] || '').trim() || 'ไม่ระบุหมวดหมู่';
                r._dept = String(r[13] || '').trim();
                r._status = String(r[22] || '').trim();
                r._taxId = String(r[21] || '').trim();
                r._dateRecTs = parseDateForFilter(r[1]);
                r._datePayTs = parseDateForFilter(r[8]);
                let jd = getJSDate(r[23]);
                r._dateProcessTs = jd ? jd.getTime() : null;
                r._dateRecStr = formatThaiDate(r[1]);
                r._datePayStr = formatThaiDate(r[8]);
                r._dateProcessStr = formatThaiDate(r[23], true);
                r._dateProcessStrShort = formatThaiDateShort(r[23]);
                return r;
            });
        }

        function updateCompanyFilter(val) {
            selectedCompany = val || "ทั้งหมด"; 
            renderReport(document.getElementById('contentContainer'));
        }

        function renderReport(container) {
            const uniqueCompanies = [...new Set(appData.map(row => String(row[2] || '').trim()).filter(val => val !== ''))].sort();

            let headerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4 no-print">
                    <div class="w-full md:w-auto">
                        <h3 class="text-2xl font-bold text-gray-800 mb-3">รายงานเจ้าหนี้ ทวนเจ้าหนี้ บริษัท</h3>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                            <label for="companyInput" class="text-gray-700 font-medium whitespace-nowrap">เลือก/พิมพ์ ชื่อบริษัท/หจก:</label>
                            <div class="flex w-full sm:w-auto relative">
                                <input type="text" id="companyInput" list="companyList" value="${selectedCompany === 'ทั้งหมด' ? '' : selectedCompany}" 
                                       onchange="updateCompanyFilter(this.value)" 
                                       placeholder="-- พิมพ์หรือเลือกบริษัท (แสดงทั้งหมด) --" 
                                       class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm w-full sm:w-[350px]">
                                <datalist id="companyList">
                                    ${uniqueCompanies.map(comp => `<option value="${comp}"></option>`).join('')}
                                </datalist>
                            </div>
                        </div>
                    </div>
                    <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition-colors shrink-0">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg> พิมพ์รายงาน
                    </button>
                </div>
            `;

            let tableHTML = `
                <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm">
                    <table class="min-w-full text-sm text-left whitespace-nowrap print-fixed-table">
                        <thead class="bg-blue-50 text-blue-900 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold text-center border-r border-gray-200" style="width: 25mm;">ค่า</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 25mm;">วันที่ตรวจรับ</th>
                                <th class="px-4 py-3 font-semibold" style="width: 60mm;">ใบส่งของ/แจ้งหนี้</th>
                                <th class="px-4 py-3 font-semibold text-right" style="width: 35mm;">จำนวนเงิน</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 35mm;">ถูกต้อง</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 35mm;">ไม่ถูกต้อง</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 30mm;">หมายเหตุ</th>
                            </tr>
                        </thead>
            `;

            let filteredData = appData;
            if (selectedCompany !== "ทั้งหมด" && selectedCompany !== "") {
                filteredData = appData.filter(row => String(row[2] || '').trim() === selectedCompany);
            }

            if (filteredData.length === 0) {
                 tableHTML += `<tbody><tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลของบริษัท "${selectedCompany}"</td></tr></tbody>`;
            } else {
                const groupedByM = {};
                filteredData.forEach(row => {
                    const e = parseNumberValue(row[4]);
                    if (e === 0) return;
                    let valM = String(row[12] || '').trim() || 'ไม่ระบุหมวดหมู่';
                    if (!groupedByM[valM]) groupedByM[valM] = [];
                    groupedByM[valM].push(row);
                });

                let sumGrandTotalE = 0;
                const mKeys = Object.keys(groupedByM).sort();

                if (mKeys.length === 0) {
                    tableHTML += `<tbody><tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">ไม่พบยอดเงินในบริษัทนี้</td></tr></tbody>`;
                } else {
                    mKeys.forEach((mKey, mIndex) => {
                        const groupRows = groupedByM[mKey];
                        let groupSumE = 0;
                        tableHTML += `<tbody class="divide-y divide-gray-100 ${mIndex > 0 ? 'page-break-before' : ''}">`;

                        groupRows.forEach((row, idx) => {
                            const e = parseNumberValue(row[4]);
                            groupSumE += e; sumGrandTotalE += e;
                            tableHTML += `<tr class="hover:bg-gray-50 transition-colors">`;
                            if (idx === 0) tableHTML += `<td rowspan="${groupRows.length}" class="px-4 py-2 font-bold text-gray-800 align-top border-r border-gray-200 bg-white truncate print-truncate" style="max-width: 25mm;" title="${mKey}">${mKey}</td>`;
                            tableHTML += `
                                <td class="px-4 py-2 text-center text-gray-800">${formatThaiDate(row[1])}</td>
                                <td class="px-4 py-2 text-gray-800 break-words">${row[3] || '-'}</td>
                                <td class="px-4 py-2 text-right text-gray-800 font-medium">${formatNumber(e)}</td>
                                <td class="px-4 py-2 text-center align-middle"><input type="checkbox" class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 rounded focus:ring-green-500 cursor-pointer"></td>
                                <td class="px-4 py-2 text-center align-middle"><input type="checkbox" class="w-4 h-4 text-red-600 bg-gray-100 border-gray-300 rounded focus:ring-red-500 cursor-pointer"></td>
                                <td class="px-4 py-2 border-l border-gray-100"></td>
                            </tr>`;
                        });
                        
                        tableHTML += `
                            <tr class="bg-gray-50 border-t border-b border-gray-200 font-semibold text-gray-700">
                                <td colspan="3" class="px-4 py-2 text-right border-r border-gray-200">รวมยอด (${mKey})</td>
                                <td class="px-4 py-2 text-right text-blue-800">${formatNumber(groupSumE)}</td>
                                <td colspan="3"></td>
                            </tr></tbody>`;
                    });

                    tableHTML += `
                        <tfoot class="bg-gray-200 border-t-2 border-gray-300 font-bold text-gray-900">
                            <tr>
                                <td colspan="3" class="px-4 py-3 text-center border-r border-gray-300">รวมยอดเงินทั้งสิ้น</td>
                                <td class="px-4 py-3 text-right text-blue-900">${formatNumber(sumGrandTotalE)}</td>
                                <td colspan="3"></td>
                            </tr>
                        </tfoot>`;
                }
            }
            tableHTML += `</table></div>`;
            container.innerHTML = headerHTML + tableHTML;
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true, 
                header: false,
                complete: function(results) {
                    if (results.data.length < 5) return updateStatus(false);
                    // Filter and map data starting from row 5 (index 4)
                    appData = enrichData(results.data.slice(4).filter(r => r.length > 0 && r.some(c => c !== "")));
                    updateStatus(true);
                    renderReport(document.getElementById('contentContainer'));
                }, 
                error: function() { 
                    updateStatus(false); 
                }
            });
        });
    </script>
</body>
</html>
